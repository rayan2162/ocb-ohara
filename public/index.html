<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>OCS Ohara</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <!-- Top nav -->
    <nav class="navbar navbar-light bg-white border-bottom sticky-top">
      <div class="container">
        <a class="navbar-brand fw-semibold d-flex align-items-center gap-2" href="#">
          <i class="bi bi-mortarboard-fill text-primary"></i>
          <span>OCS Ohara</span>
        </a>
        <div class="d-flex align-items-center gap-2">
          <span id="courseCount" class="text-muted small"></span>
        </div>
      </div>
    </nav>

    <main class="container py-4">
      <!-- Course list view -->
      <section id="coursesView">
        <div id="emptyState" class="empty-state text-center py-5 d-none">
          <div class="empty-state-icon">
            <i class="bi bi-mortarboard-fill"></i>
          </div>
          <h3 class="mt-3 mb-2">No courses yet</h3>
          <p class="text-muted mb-4">
            Drop a <code>.json</code> course file into the <code>courses/</code> folder and refresh.
          </p>
        </div>
        <div id="coursesList" class="row g-3"></div>
      </section>
    </main>

    <!-- Course detail modal: just shows the JSON and a download button. -->
    <div class="modal fade" id="courseModal" tabindex="-1">
      <div class="modal-dialog modal-lg modal-dialog-scrollable">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="courseModalTitle">Course</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body">
            <p class="text-muted mb-2" id="courseModalMeta"></p>
            <p class="mb-3" id="courseModalDescription"></p>
            <pre
              id="courseModalJson"
              class="preview-text"
              style="max-height: 60vh;"
            ></pre>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-light" data-bs-dismiss="modal">Close</button>
            <button type="button" class="btn btn-primary" id="courseModalDownloadBtn">
              <i class="bi bi-download me-1"></i> Download JSON
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Toast -->
    <div class="toast-container position-fixed bottom-0 end-0 p-3">
      <div id="toast" class="toast align-items-center text-bg-dark border-0" role="alert">
        <div class="d-flex">
          <div class="toast-body" id="toastBody">Done</div>
          <button
            type="button"
            class="btn-close btn-close-white me-2 m-auto"
            data-bs-dismiss="toast"
          ></button>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/main.js"></script>
  </body>
</html>
